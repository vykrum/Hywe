<!DOCTYPE html>
<script>
    const s = 1, l = location, b = l.pathname.split('/').slice(0, 1 + s).join('/'),
        p = l.pathname.slice(1).split('/').slice(s).join('/'),
        q = l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '';
    l.replace(`${l.protocol}//${l.hostname}${l.port ? ':' + l.port : ''}${b}/?p=/${p.replace(/&/g, '~and~')}${q}${l.hash}`);
</script>
